<!DOCTYPE html>
<html><head><style>
.line { text-indent:-2em; padding-left:2em; font-size:24px; line-height:2; max-width:400px; background:#222; color:#ddd; }
.w { display:inline-block; vertical-align:top; text-align:center; margin-right:0.25em; }
.gl { display:block; font-size:10px; color:#f90; }
</style></head><body>
<div class="line">
<span class="w">First<span class="gl">one</span></span>
<span class="w">Second<span class="gl">two</span></span>
<span class="w">Third<span class="gl">three</span></span>
<span class="w">Fourth<span class="gl">four</span></span>
<span class="w">Fifth<span class="gl">five</span></span>
<span class="w">Sixth<span class="gl">six</span></span>
<span class="w">Seventh<span class="gl">seven</span></span>
<span class="w">Eighth<span class="gl">eight</span></span>
</div>
</body></html>
